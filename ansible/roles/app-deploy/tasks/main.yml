---
- name: Pull latest Docker image
  docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_tag }}"
    source: pull
    force_source: yes

- name: Stop existing container (if running)
  docker_container:
    name: "{{ container_name }}"
    state: absent
  ignore_errors: yes

- name: Run new container
  docker_container:
    name: "{{ container_name }}"
    image: "{{ docker_image }}:{{ docker_tag }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "3000:3000"
    env:
      NODE_ENV: "production"
      PORT: "3000"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"

- name: Ensure Docker starts on boot
  systemd:
    name: docker
    enabled: yes

- name: Wait for app to start
  uri:
    url: "http://localhost:3000/health"
    status_code: 200
  register: health_check
  retries: 10
  delay: 3
  until: health_check.status == 200

- name: Print health check result
  debug:
    msg: "App is healthy: {{ health_check.json }}"
